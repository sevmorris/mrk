name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install shellcheck
        run: brew install shellcheck

      - name: CI checks
        run: scripts/ci-check

      - name: Go build
        run: make build-tools
