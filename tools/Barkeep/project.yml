name: Barkeep

options:
  bundleIdPrefix: io.github.sevmorris
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Barkeep:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Barkeep
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.sevmorris.Barkeep
        INFOPLIST_KEY_CFBundleDisplayName: Barkeep
        INFOPLIST_KEY_NSHumanReadableDescription: Homebrew package manager
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
    info:
      path: Barkeep/Info.plist
      properties:
        CFBundleName: Barkeep
        CFBundleDisplayName: Barkeep
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableDescription: Homebrew package manager
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
