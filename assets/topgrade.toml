[misc]
assume_yes = true
pre_sudo = true
sudo_command = "sudo"

# Modules you don't want Topgrade to touch
# "system" = macOS softwareupdate (handled separately)
# "pnpm"   = managed via npm, not standalone
disable = ["system", "mas", "pnpm", "pip3", "node"]

no_retry = true
cleanup = true

# Don't self-update — Homebrew manages the topgrade binary
no_self_update = true

# Only notify at the end, not per-step
notify_each_step = false

[pre_commands]
# corepack/yarn/pnpm install shims into Homebrew's bin/ that shadow
# the real Node binaries. Clean them before updating.
"Clean Node global shims" = "bash -lc 'bp=$(brew --prefix 2>/dev/null) && rm -f \"$bp\"/bin/{yarn,pnpm,corepack} && rm -rf \"$bp\"/lib/node_modules/{yarn,pnpm,corepack}'"

[commands]
"npm global update" = "bash -lc 'export NVM_DIR=\"$HOME/.nvm\"; [ -s \"/opt/homebrew/opt/nvm/nvm.sh\" ] && . \"/opt/homebrew/opt/nvm/nvm.sh\"; npm update -g'"

[post_commands]
"pipx upgrade-all" = "bash -lc 'command -v pipx >/dev/null && pipx upgrade-all || true'"
"pip cache purge" = "bash -lc 'command -v pip3 >/dev/null && pip3 cache purge || true'"
"Homebrew cache scrub" = "bash -lc 'command -v brew >/dev/null && brew cleanup -s --prune=30 || true'"
"npm cache verify" = "bash -lc 'export NVM_DIR=\"$HOME/.nvm\"; [ -s \"/opt/homebrew/opt/nvm/nvm.sh\" ] && . \"/opt/homebrew/opt/nvm/nvm.sh\"; command -v npm >/dev/null && npm cache verify || true'"
"pyenv rehash" = "bash -lc 'command -v pyenv >/dev/null && pyenv rehash || true'"
"go clean test cache" = "bash -lc 'command -v go >/dev/null && go clean -testcache || true'"
"Refresh zsh completions" = "bash -lc 'rm -f \"$HOME\"/.zcompdump* 2>/dev/null || true'"

[brew]
greedy_cask = true
autoremove = true
